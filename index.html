<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cartelera Escolar · Los Guayos</title>
  <!-- Font Awesome 6 (iconos) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    :root {
      --azul-profundo: #1e3c72;   /* estrategico: estabilidad, educación */
      --amarillo-dorado: #f0b400; /* calidez, eventos importantes */
      --rojo-patria: #d32f2f;      /* llamado a la acción, efemérides */
      --gris-claro: #f5f7fa;
      --blanco-puro: #ffffff;
      --sombra-suave: rgba(0, 20, 30, 0.1);
      --texto-oscuro: #1e2b37;
    }

    body {
      background: var(--gris-claro);
      color: var(--texto-oscuro);
      line-height: 1.5;
      padding: 1.5rem 2rem;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* encabezado con bandera venezolana (sutil) */
    .header-bandera {
      background: linear-gradient(135deg, #f0b400 0%, #f0b400 33%, #1e3c72 33%, #1e3c72 66%, #d32f2f 66%, #d32f2f 100%);
      height: 8px;
      width: 100%;
      border-radius: 4px 4px 0 0;
      margin-bottom: 1.5rem;
    }

    .cabecera-principal {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      background: var(--blanco-puro);
      padding: 1rem 2rem;
      border-radius: 32px 32px 16px 16px;
      box-shadow: 0 12px 24px var(--sombra-suave);
      margin-bottom: 2rem;
      border-left: 6px solid var(--amarillo-dorado);
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 1.2rem;
    }

    .logo-area img {
      height: 70px;
      width: auto;
      border-radius: 50%;
      border: 3px solid var(--amarillo-dorado);
      background: white;
      object-fit: cover;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .titulos-municipio h1 {
      font-size: 1.9rem;
      font-weight: 700;
      color: var(--azul-profundo);
      letter-spacing: -0.5px;
    }

    .titulos-municipio p {
      font-size: 1.1rem;
      color: #2c3e50;
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }

    .fecha-actual {
      background: var(--azul-profundo);
      color: white;
      padding: 0.6rem 1.4rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 1rem;
      box-shadow: 0 4px 0 #0f2a4a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .fecha-actual i {
      color: var(--amarillo-dorado);
    }

    /* pestañas de filtro (js) */
    .filtros-rapidos {
      display: flex;
      justify-content: center;
      gap: 0.8rem;
      margin: 2rem 0 1.5rem;
      flex-wrap: wrap;
    }

    .btn-filtro {
      background: white;
      border: none;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
      transition: 0.2s ease;
      border: 2px solid transparent;
      color: var(--azul-profundo);
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-filtro i {
      color: var(--amarillo-dorado);
    }

    .btn-filtro.activo {
      background: var(--azul-profundo);
      color: white;
      border-color: var(--amarillo-dorado);
    }

    .btn-filtro.activo i {
      color: var(--amarillo-dorado);
    }

    .btn-filtro:hover {
      background: var(--amarillo-dorado);
      color: var(--azul-profundo);
      transform: translateY(-3px);
    }

    /* grid de tarjetas */
    .cartelera-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin: 2rem 0 3rem;
    }

    .tarjeta {
      background: var(--blanco-puro);
      border-radius: 28px;
      padding: 1.5rem 1.2rem 1.2rem 1.2rem;
      box-shadow: 0 18px 30px -8px rgba(30,60,114,0.2);
      transition: all 0.25s ease;
      border-bottom: 6px solid transparent;
      display: flex;
      flex-direction: column;
      border-left: 3px solid var(--amarillo-dorado);
      position: relative;
    }

    .tarjeta:hover {
      transform: scale(1.02) translateY(-6px);
      border-bottom-color: var(--rojo-patria);
      box-shadow: 0 25px 35px -8px var(--azul-profundo);
    }

    .tarjeta.efemeride {
      border-left-color: var(--rojo-patria);
    }

    .tarjeta.proyecto {
      border-left-color: var(--azul-profundo);
    }

    .icono-categoria {
      font-size: 2.2rem;
      margin-bottom: 0.5rem;
    }

    .categoria-badge {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: var(--gris-claro);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: var(--azul-profundo);
      border: 1px solid #dde7f0;
    }

    .tarjeta h3 {
      font-size: 1.5rem;
      font-weight: 700;
      margin: 0.5rem 0 0.3rem;
      color: var(--azul-profundo);
      padding-right: 2rem;
    }

    .tarjeta .fecha {
      color: var(--rojo-patria);
      font-weight: 600;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 5px;
      background: #ffeeee;
      padding: 0.2rem 0.8rem;
      border-radius: 30px;
      width: fit-content;
      margin: 0.5rem 0;
    }

    .tarjeta .descripcion {
      color: #2e4059;
      margin: 0.5rem 0 1rem;
      line-height: 1.5;
      flex: 1;
    }

    .tarjeta .institucion {
      font-size: 0.9rem;
      color: #4a5f73;
      border-top: 1px dashed #cbd5e1;
      padding-top: 0.8rem;
      margin-top: 0.3rem;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* botón volver (estratégico) */
    .pie-volver {
      text-align: center;
      margin: 2rem 0 1rem;
    }

    .btn-volver {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--rojo-patria);
      color: white;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.3rem;
      padding: 1rem 3.5rem;
      border-radius: 80px;
      box-shadow: 0 12px 0 #7f1d1d, 0 6px 20px rgba(211,47,47,0.4);
      transition: 0.15s ease;
      border: 2px solid var(--amarillo-dorado);
      letter-spacing: 0.5px;
    }

    .btn-volver i {
      font-size: 1.5rem;
      color: var(--amarillo-dorado);
    }

    .btn-volver:hover {
      background: #b71c1c;
      transform: translateY(-4px);
      box-shadow: 0 16px 0 #7f1d1d, 0 10px 25px rgba(180,30,30,0.5);
    }

    .btn-volver:active {
      transform: translateY(6px);
      box-shadow: 0 6px 0 #7f1d1d;
    }

    footer {
      margin-top: auto;
      font-size: 0.9rem;
      color: #5e6f88;
      text-align: center;
      padding: 1.5rem 0 0.2rem;
      border-top: 2px solid rgba(30,60,114,0.1);
    }

    footer i {
      color: var(--amarillo-dorado);
    }

    /* mensaje sin resultados */
    .sin-resultados {
      text-align: center;
      font-size: 1.4rem;
      padding: 3rem;
      background: white;
      border-radius: 60px;
      color: var(--azul-profundo);
      grid-column: 1 / -1;
    }

    /* responsive */
    @media (max-width: 650px) {
      body { padding: 1rem; }
      .cabecera-principal { flex-direction: column; align-items: start; gap: 1rem; }
      .logo-area img { height: 60px; }
      .titulos-municipio h1 { font-size: 1.5rem; }
      .btn-volver { font-size: 1rem; padding: 0.8rem 2rem; }
    }
  </style>
</head>
<body>
  <div class="header-bandera"></div>

  <!-- cabecera con logo, títulos y fecha dinámica -->
  <header class="cabecera-principal">
    <div class="logo-area">
      <!-- imagen del repositorio: logolosguayosdigital.jpg -->
      <img src="logolosguayosdigital.jpg" alt="Logo Los Guayos Digital" onerror="this.src='https://via.placeholder.com/70x70?text=Logo'">
      <div class="titulos-municipio">
        <h1>📌 Cartelera Escolar</h1>
        <p><i class="fas fa-map-pin" style="color:var(--rojo-patria);"></i> Municipio Los Guayos · Carabobo · Venezuela</p>
        <p><i class="fas fa-graduation-cap" style="color:var(--azul-profundo);"></i> Efemérides y proyectos educativos</p>
      </div>
    </div>
    <div class="fecha-actual" id="fechaDinamica">
      <i class="fas fa-calendar-alt"></i>
      <span>Cargando fecha...</span>
    </div>
  </header>

  <!-- pestañas de filtro (JavaScript) -->
  <div class="filtros-rapidos">
    <button class="btn-filtro activo" data-filter="all"><i class="fas fa-th-large"></i> Todas</button>
    <button class="btn-filtro" data-filter="efemeride"><i class="fas fa-star"></i> Efemérides</button>
    <button class="btn-filtro" data-filter="proyecto"><i class="fas fa-flask"></i> Proyectos</button>
  </div>

  <!-- grid principal de tarjetas (contenido educativo) -->
  <main class="cartelera-grid" id="carteleraContainer">
    <!-- las tarjetas se generan con JS para mantener HTML ordenado,
         pero podemos ponerlas directamente y filtrar con clase.
         Las escribo directamente para que sean visibles sin JS -->
  </main>

  <!-- botón volver al sitio principal (requisito) -->
  <div class="pie-volver">
    <a href="https://losguayosdigital.com/educacion" class="btn-volver" target="_blank" rel="noopener">
      <i class="fas fa-arrow-left"></i> Volver a LosGuayosDigital / Educación
    </a>
  </div>

  <footer>
    <i class="fas fa-chalkboard-teacher"></i> Dirección de Educación · Alcaldía de Los Guayos · 
    <span id="anioActual"></span> ·  Cartelera interactiva
  </footer>

  <script>
    (function() {
      // ---------- BASE DE DATOS DE EFEMÉRIDES Y PROYECTOS (indagación educativa) ----------
      const itemsData = [
        // Efemérides patrias y regionales
        { categoria: 'efemeride', titulo: '19 de Abril · Declaración de la Independencia', fecha: '19/04/1810', descripcion: 'Primer paso hacia la libertad venezolana. Memoria y reflexión en las aulas.', institucion: 'Ministerio del P.P. para la Educación', icono: 'fa-landmark' },
        { categoria: 'efemeride', titulo: '24 de Junio · Batalla de Carabobo', fecha: '24/06/1821', descripcion: 'Combate decisivo en Carabobo. Nuestro municipio honra a los próceres.', institucion: 'Gobernación de Carabobo', icono: 'fa-flag' },
        { categoria: 'efemeride', titulo: '5 de Julio · Día de la Independencia', fecha: '05/07/1811', descripcion: 'Firma del Acta de Independencia. Actos cívicos en todas las escuelas.', institucion: 'Zona Educativa Carabobo', icono: 'fa-scroll' },
        { categoria: 'efemeride', titulo: '12 de Octubre · Resistencia Indígena', fecha: '12/10/1492', descripcion: 'Día de la diversidad cultural y reivindicación de los pueblos originarios.', institucion: 'Cátedra de Historia', icono: 'fa-hand-holding-heart' },
        { categoria: 'efemeride', titulo: '15 de Enero · Día del Maestro', fecha: '15/01/1932', descripcion: 'Homenaje a los educadores que construyen futuro en Los Guayos.', institucion: 'Sindicato de Educadores', icono: 'fa-chalkboard-user' },
        { categoria: 'efemeride', titulo: '17 de Diciembre · Siembra de Bolívar', fecha: '17/12/1830', descripcion: 'Muerte del Libertador. Juramento de fidelidad a la patria.', institucion: 'Sociedad Bolivariana', icono: 'fa-crown' },
        // Proyectos escolares activos (Municipio Los Guayos)
        { categoria: 'proyecto', titulo: 'Lectura y Escritura Creativa', fecha: 'Marzo - Julio 2026', descripcion: 'Talleres literarios en la E.B. "Los Guayos". Producción de cuentos y poemas locales.', institucion: 'E.B. Los Guayos', icono: 'fa-book-open' },
        { categoria: 'proyecto', titulo: 'Feria de Ciencias "Explora Carabobo"', fecha: 'Abril 2026', descripcion: 'Proyectos científicos estudiantil en la U.E. "José Antonio Páez".', institucion: 'U.E. José Antonio Páez', icono: 'fa-microscope' },
        { categoria: 'proyecto', titulo: 'Eco-Escuelas · Reciclaje', fecha: 'Todo el año', descripcion: 'Recolección de plástico y papel. Liceo "Rafael Urdaneta" lidera la iniciativa.', institucion: 'Liceo Rafael Urdaneta', icono: 'fa-recycle' },
        { categoria: 'proyecto', titulo: 'Encuentro de Danzas Tradicionales', fecha: 'Junio 2026', descripcion: 'Agrupaciones folklóricas de 8 escuelas municipales. Sedes: Plaza Bolívar.', institucion: 'Casa de la Cultura', icono: 'fa-music' },
        { categoria: 'proyecto', titulo: 'Huerto Escolar Bicentenario', fecha: 'Permanente', descripcion: 'Siembra de vegetales y conciencia ecológica en la E.B. Bicentenario.', institucion: 'E.B. Bicentenario', icono: 'fa-seedling' },
        { categoria: 'proyecto', titulo: 'Olimpiadas de Matemáticas', fecha: 'Mayo 2026', descripcion: 'Competencia intermunicipal en la U.E. "Los Guayos". Inscripciones abiertas.', institucion: 'Coordinación de Matemática', icono: 'fa-calculator' }
      ];

      const container = document.getElementById('carteleraContainer');
      const botonesFiltro = document.querySelectorAll('.btn-filtro');
      
      // función para renderizar tarjetas según filtro
      function renderizarCartelera(filtro = 'all') {
        if (!container) return;
        const itemsFiltrados = itemsData.filter(item => filtro === 'all' ? true : item.categoria === filtro);
        
        if (itemsFiltrados.length === 0) {
          container.innerHTML = `<div class="sin-resultados"><i class="fas fa-calendar-times"></i> No hay eventos en esta categoría</div>`;
          return;
        }

        let html = '';
        itemsFiltrados.forEach(item => {
          const claseCat = item.categoria === 'efemeride' ? 'efemeride' : 'proyecto';
          const badgeTexto = item.categoria === 'efemeride' ? 'Efeméride' : 'Proyecto';
          const iconoGeneral = item.categoria === 'efemeride' ? 'fa-calendar-day' : 'fa-people-group';
          
          html += `
            <div class="tarjeta ${claseCat}" data-categoria="${item.categoria}">
              <span class="categoria-badge"><i class="fas ${item.categoria === 'efemeride' ? 'fa-star' : 'fa-flask'}"></i> ${badgeTexto}</span>
              <div class="icono-categoria">
                <i class="fas ${item.icono || iconoGeneral}" style="color: var(--azul-profundo);"></i>
              </div>
              <h3>${item.titulo}</h3>
              <div class="fecha"><i class="far fa-calendar-alt"></i> ${item.fecha}</div>
              <p class="descripcion">${item.descripcion}</p>
              <div class="institucion"><i class="fas fa-school"></i> ${item.institucion}</div>
            </div>
          `;
        });
        container.innerHTML = html;
      }

      // inicializar con todas
      renderizarCartelera('all');

      // evento para botones de filtro
      botonesFiltro.forEach(btn => {
        btn.addEventListener('click', function(e) {
          // quitar clase activo de todos
          botonesFiltro.forEach(b => b.classList.remove('activo'));
          this.classList.add('activo');
          
          const filtro = this.dataset.filter; // 'all', 'efemeride', 'proyecto'
          renderizarCartelera(filtro);
        });
      });

      // ---------- fecha dinámica en el header ----------
      function actualizarFecha() {
        const hoy = new Date();
        const opciones = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        const fechaFormateada = hoy.toLocaleDateString('es-VE', opciones);
        const spanFecha = document.querySelector('#fechaDinamica span');
        if (spanFecha) {
          spanFecha.textContent = fechaFormateada.charAt(0).toUpperCase() + fechaFormateada.slice(1);
        }
        // año en el footer
        const anioSpan = document.getElementById('anioActual');
        if (anioSpan) anioSpan.textContent = new Date().getFullYear();
      }
      actualizarFecha();

      // Manejo de error si la imagen del logo no existe (mostrar placeholder con iniciales)
      const logoImg = document.querySelector('.logo-area img');
      if (logoImg) {
        logoImg.onerror = function() {
          this.onerror = null; // evitar bucle
          this.src = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="%231e3c72"><circle cx="50" cy="50" r="45" fill="%23f0b400"/><text x="50" y="70" font-size="50" text-anchor="middle" fill="%231e3c72" font-weight="bold">LGD</text></svg>';
        };
      }
    })();
  </script>
</body>
</html>
